services:
  scoreboard:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4173}:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      DATA_DIR: /data
      STORAGE_DRIVER: sqlite
      DATABASE_FILE: /data/scoreboard.sqlite
      PARTY_CREATION: ${PARTY_CREATION:-admin}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    volumes:
      - esc-scoreboard-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  esc-scoreboard-data:
